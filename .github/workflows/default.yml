name: GitHub Pages

on:
  push:
    branches:
      - main
      - "v*" # Matches version branches like v1.0, v1.1, etc.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.10'

      - name: Upgrade pip
        run: |
          # install pip=>20.1 to use "pip cache dir"
          python3 -m pip install --upgrade pip

      - name: Get pip cache dir
        id: pip-cache
        run: echo "dir=$(pip cache dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.pip-cache.outputs.dir }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python3 -m pip install -r ./requirements.txt

      - name: Install missing Sphinx Tabs dependency
        run: python3 -m pip install sphinx-tabs

      - name: Build Documentation
        run: sphinx-build -b html dsa build -c .

      - name: Install mike
        run: python3 -m pip install mike

      - name: Create mkdocs config
        run: |
          echo "site_name: My Documentation" > mkdocs.yml
          echo "docs_dir: build" >> mkdocs.yml

      - name: Deploy Documentation with mike
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Deploy the current version from the branch (e.g., v1.0, v1.1, etc.)
          if [[ "${GITHUB_REF##*/}" == v* ]]; then
            VERSION=${GITHUB_REF##*/}
            mike deploy --push --branch gh-pages "$VERSION" latest
          # Deploy "dev" version from the main branch
          elif [ "${GITHUB_REF##*/}" == "main" ]; then
            mike deploy --push --branch gh-pages dev
            mike set-default --push latest
          fi

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Run this only on 'main' branch.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
